<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Signup</title>
    <link href="../css/output.css" rel="stylesheet" />
  </head>

  <body class="bg-black text-white h-screen flex">
    <!-- LEFT SIDE (IMAGE + TEXT) -->
    <div class="hidden md:flex w-1/2 bg-black items-center justify-center p-10">
      <div class="max-w-md text-center">
        <h1 class="text-4xl font-bold leading-snug">
          Talk. Share. Connect. <br />
          <span class="text-pink-500">Hangouts</span>
        </h1>

        <!-- Image -->
        <img
          src="https://images.pexels.com/photos/4307699/pexels-photo-4307699.jpeg"
          alt="chat"
          class="mt-8 rounded-2xl shadow-lg object-cover"
        />
      </div>
    </div>

    <!-- RIGHT SIDE (FORM) -->
    <div class="w-full md:w-1/2 flex items-center justify-center bg-gray-900">
      <div class="w-full max-w-md p-8">
        <h2 class="text-2xl font-semibold mb-6">Create your account</h2>

        <form id="signupForm" class="space-y-4">
          <input
            type="text"
            id="name"
            placeholder="Name"
            required
            class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />

          <input
            type="email"
            id="email"
            placeholder="Email"
            required
            class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />

          <input
            type="tel"
            id="phone"
            placeholder="Phone Number"
            required
            class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
            class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />

          <button
            class="w-full bg-blue-600 py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
          >
            Sign up
          </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
          Already have an account?
          <a href="./login.html" class="text-blue-500 hover:underline">
            Login
          </a>
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/signup.js"></script>
  </body>
</html>
