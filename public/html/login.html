<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link href="../css/output.css" rel="stylesheet" />
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-96">
      <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-sm">Email or Phone</label>
          <input
            type="text"
            id="identifier"
            required
            class="w-full p-2 border rounded-lg mt-1"
          />
        </div>

        <div class="mb-4">
          <label class="block text-sm">Password</label>
          <input
            type="password"
            id="password"
            required
            class="w-full p-2 border rounded-lg mt-1"
          />
        </div>

        <button
          class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600"
        >
          Login
        </button>
      </form>

      <p class="text-center mt-4 text-sm">
        Don't have an account?
        <a href="./html/signup.html" class="text-blue-500">Signup</a>
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
